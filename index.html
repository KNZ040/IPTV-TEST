<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="referrer" content="no-referrer">
  <title>TiviWeb Player</title>
  <style>
    /* Reset & Fonts (iOS 9 Safe) */
    * { -webkit-box-sizing: border-box; box-sizing: border-box; }
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background-color: #0b0c10; color: #ececec; overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .hidden { display: none !important; }

    /* Custom Scrollbars (Clean look) */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }

    /* --- LOGIN SCHERM (Dark Glass Effect) --- */
    #login-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: #050608 url('https://picsum.photos/1920/1080?blur=10&dark=1') no-repeat center center;
      background-size: cover; z-index: 100;
    }
    .login-box {
      position: absolute; top: 50%; left: 50%; width: 340px;
      -webkit-transform: translate(-50%, -50%); transform: translate(-50%, -50%);
      background: rgba(19, 21, 26, 0.9); padding: 40px 30px;
      border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05);
      -webkit-box-shadow: 0 20px 50px rgba(0,0,0,0.8); box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    }
    .login-box h2 {
      margin: 0 0 25px 0; font-size: 24px; font-weight: 500; text-align: center; color: #f2f2f2;
    }
    .input-field {
      width: 100%; padding: 14px 16px; margin-bottom: 12px;
      background-color: rgba(0,0,0,0.3); border: 1px solid #2a2c33;
      color: #fff; border-radius: 6px; font-size: 14px; outline: none;
    }
    .input-field:focus { border-color: #dcb954; }
    .btn {
      width: 100%; padding: 14px; background: #dcb954; color: #0b0c10;
      border: none; border-radius: 6px; font-size: 14px; font-weight: bold;
      text-transform: uppercase; cursor: pointer; margin-top: 10px;
    }
    .btn:active { background: #c2a245; }
    #login-status { margin-top: 15px; color: #ff5e5e; font-size: 12px; text-align: center; }

    /* --- APP SCHERM (3-KOLOMMEN ABSOLUTE LAYOUT, THE MOST BULLETPROOF FOR IOS 9) --- */
    #col-cats {
      position: absolute; top: 0; left: 0; bottom: 0; width: 260px;
      background: #13151a; border-right: 1px solid #1a1c23; z-index: 3;
    }
    #col-chans {
      position: absolute; top: 0; left: 260px; bottom: 0; width: 320px;
      background: #181a20; border-right: 1px solid #22252e; z-index: 2;
    }
    #col-player {
      position: absolute; top: 0; left: 580px; right: 0; bottom: 0;
      background: #0b0c10; z-index: 1; overflow-y: auto;
    }

    /* Pane Headers & Search */
    .pane-header {
      padding: 20px; background: #13151a; font-size: 16px; font-weight: bold;
      color: #ececec; border-bottom: 1px solid #1f2229; height: 60px;
    }
    .pane-header-search {
      padding: 10px 15px; background: #181a20; border-bottom: 1px solid #22252e; height: 60px;
    }
    .search-input {
      width: 100%; padding: 10px 15px; border-radius: 20px;
      background: #0f1115; border: 1px solid #2a2d36; color: #fff;
      font-size: 13px; outline: none;
    }
    .search-input:focus { border-color: #dcb954; }

    /* Scrollable Lists */
    .scroll-list {
      position: absolute; top: 60px; left: 0; right: 0; bottom: 0;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
    }

    /* List Items Styling */
    .cat-item, .chan-item {
      padding: 16px 20px; font-size: 14px; color: #a1a5b3;
      border-bottom: 1px solid rgba(255,255,255,0.02); cursor: pointer;
      position: relative; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cat-item:active, .chan-item:active { background: #1d2028; }
    
    .cat-item.active { background: #1a1c23; color: #fff; border-left: 4px solid #dcb954; padding-left: 16px; font-weight: 500; }
    .chan-item.active { background: #232630; color: #dcb954; font-weight: bold; }
    
    /* Favorieten Ster Icon */
    .star-btn {
      position: absolute; right: 15px; top: 14px; padding: 2px 10px;
      font-size: 18px; color: #444; border: none; background: transparent; cursor: pointer;
    }
    
    /* Loading States */
    .loading-msg { padding: 30px; text-align: center; color: #666; font-size: 12px; letter-spacing: 1px; }

    /* --- VIDEO PLAYER & EPG --- */
    #video-wrapper {
      width: 100%; background: #000; position: relative;
      /* Forceer een ~16:9 ratio in top sectie */
      min-height: 250px;
      max-height: 60vh;
    }
    video { width: 100%; height: 100%; display: block; background: #000; max-height: 60vh;}
    
    #epg-wrapper { padding: 30px; }
    #epg-wrapper h1 { margin: 0 0 10px 0; font-size: 26px; font-weight: 400; color: #fff; }
    #epg-wrapper h2 { margin: 0 0 30px 0; font-size: 15px; font-weight: 400; color: #a1a5b3; }

    .epg-slot {
      background: #13151a; border-left: 3px solid #333; padding: 15px 20px;
      margin-bottom: 15px; border-radius: 4px;
    }
    .epg-slot.now-playing { border-left-color: #dcb954; background: #1a1c23; }
    .epg-time { font-size: 12px; color: #dcb954; margin-bottom: 5px; font-family: monospace; }
    .epg-title { font-size: 16px; color: #fff; margin-bottom: 8px; font-weight: 500; }
    .epg-desc { font-size: 13px; color: #889; line-height: 1.5; }

  </style>
</head>
<body>

  <!-- LOGIN SCHERM -->
  <div id="login-screen">
    <div class="login-box">
      <h2>TiviWeb Player</h2>
      <input type="url" id="ix-url" class="input-field" placeholder="http://server.com:8080" />
      <input type="text" id="ix-user" class="input-field" placeholder="Gebruikersnaam" />
      <input type="password" id="ix-pass" class="input-field" placeholder="Wachtwoord" />
      
      <label style="display: block; font-size: 12px; margin: 10px 0 20px 0; color: #889; cursor: pointer;">
        <input type="checkbox" id="ix-remember" checked style="vertical-align: middle; margin-right: 8px;"> 
        Onthoud inloggegevens
      </label>

      <button class="btn" onclick="login()">Inloggen</button>
      <div id="login-status"></div>
    </div>
  </div>

  <!-- APP SCHERM -->
  <div id="app-screen" class="hidden">
    
    <!-- KOLOM 1: Categorieën -->
    <div id="col-cats">
      <div class="pane-header" onclick="loadCategories()" style="cursor:pointer;" title="Klik om te verversen">
        TiviWeb ⟳
      </div>
      <div class="scroll-list" id="list-cats">
        <div class="loading-msg">Laden...</div>
      </div>
    </div>

    <!-- KOLOM 2: Zenders -->
    <div id="col-chans">
      <div class="pane-header-search">
        <input type="text" id="search-box" class="search-input" placeholder="🔍 Zoek zender..." onkeyup="filterChannels()" />
      </div>
      <div class="scroll-list" id="list-chans">
        <div class="loading-msg" style="margin-top: 50px;">Selecteer een categorie</div>
      </div>
    </div>

    <!-- KOLOM 3: Speler & Info -->
    <div id="col-player">
      <div id="video-wrapper">
        <video id="video-player" controls preload="none" playsinline webkit-playsinline></video>
      </div>
      
      <div id="epg-wrapper">
        <h1 id="info-title">Welkom bij TiviWeb</h1>
        <h2 id="info-subtitle">Selecteer een zender om te beginnen</h2>
        <div id="epg-timeline">
          <!-- EPG items komen hier -->
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
  <script>
    /* == GLOBALS & ES5 STRICT == */
    var xtreamUrl = "";
    var xtreamUser = "";
    var xtreamPass = "";
    var myFavorites = [];
    var currentChannels = []; // Slaat huidige zenders op voor zoeken

    /* == HELPER: XHR Request with Proxy Logic == */
    function ajaxRequest(url, onSuccess, onError) {
      // In het geval dit op GitHub Pages/HTTPS draait, gebruik open proxy
      var finalUrl = url;
      if (window.location.protocol === 'https:' && url.indexOf('http://') === 0) {
        finalUrl = "https://corsproxy.io/?" + encodeURIComponent(url);
      }

      var xhr = new XMLHttpRequest();
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status >= 200 && xhr.status < 300) {
            try {
              onSuccess(JSON.parse(xhr.responseText));
            } catch (e) {
              onError("Data fout: " + e.message);
            }
          } else if (xhr.status !== 0) {
            onError("Netwerkfout: " + xhr.status);
          }
        }
      };
      xhr.onerror = function() { onError("Verbindingsfout of CORS geblokkeerd."); };
      try {
        xhr.open("GET", finalUrl, true);
        xhr.send();
      } catch(e) { onError("Kan niet verzenden: " + e.message); }
    }

    /* == HELPER: Cache == */
    function fetchData(cacheKey, url, duration, callback, errCallback) {
      var remember = document.getElementById("ix-remember") ? document.getElementById("ix-remember").checked : false;
      if (remember && cacheKey) {
        var cached = localStorage.getItem(cacheKey);
        var cacheTime = localStorage.getItem(cacheKey + "_time");
        if (cached && cacheTime && (new Date().getTime() - parseInt(cacheTime) < duration)) {
          try { callback(JSON.parse(cached)); return; } catch(e) {}
        }
      }
      ajaxRequest(url, function(data) {
        if (remember && cacheKey) {
          try {
            localStorage.setItem(cacheKey, JSON.stringify(data));
            localStorage.setItem(cacheKey + "_time", new Date().getTime().toString());
          } catch(e) {}
        }
        callback(data);
      }, errCallback);
    }

    /* == INIT & LOGIN == */
    window.onload = function() {
      // Laad opgeslagen favorieten (indien aanwezig)
      var savedFavs = localStorage.getItem("tw_favs");
      if(savedFavs) { try { myFavorites = JSON.parse(savedFavs); } catch(e){} }

      // Laad inloggegevens
      if (localStorage.getItem("ix_url")) {
        document.getElementById("ix-url").value = localStorage.getItem("ix_url");
        document.getElementById("ix-user").value = localStorage.getItem("ix_user");
        document.getElementById("ix-pass").value = decodeURIComponent(localStorage.getItem("ix_pass"));
      }
    };

    function login() {
      var rawUrl = document.getElementById("ix-url").value;
      if(rawUrl) {
          rawUrl = rawUrl.replace(/\s/g, '').replace(/^(https?:\/\/)+/i, 'http://');
          if (rawUrl.charAt(rawUrl.length - 1) === '/') rawUrl = rawUrl.substr(0, rawUrl.length - 1);
          if (rawUrl.indexOf("http") !== 0) rawUrl = "http://" + rawUrl;
      }
      xtreamUrl = rawUrl;
      xtreamUser = document.getElementById("ix-user").value;
      xtreamPass = encodeURIComponent(document.getElementById("ix-pass").value);
      
      var remember = document.getElementById("ix-remember").checked;
      var statusBtn = document.getElementById("login-status");

      if (!xtreamUrl || !xtreamUser || !xtreamPass) { statusBtn.innerHTML = "Vul alles in."; return; }

      if (remember) {
        localStorage.setItem("ix_url", xtreamUrl);
        localStorage.setItem("ix_user", xtreamUser);
        localStorage.setItem("ix_pass", xtreamPass);
      }

      statusBtn.innerHTML = "Verbinden...";
      var authUrl = xtreamUrl + "/player_api.php?username=" + xtreamUser + "&password=" + xtreamPass;
      
      ajaxRequest(authUrl, function(data) {
        if (data.user_info && data.user_info.auth === 1) {
          document.getElementById("login-screen").className = "hidden";
          document.getElementById("app-screen").className = "";
          loadCategories();
        } else {
          statusBtn.innerHTML = "Ongeldige gegevens.";
        }
      }, function(err) { statusBtn.innerHTML = "Fout: " + err; });
    }

    /* == CATEGORIEËN & FAVORIETEN == */
    function loadCategories() {
      var catDiv = document.getElementById("list-cats");
      catDiv.innerHTML = '<div class="loading-msg">Laden...</div>';
      var catUrl = xtreamUrl + "/player_api.php?username=" + xtreamUser + "&password=" + xtreamPass + "&action=get_live_categories";
      
      fetchData("tw_cache_cats", catUrl, 86400000, function(data) {
        var html = '<div class="cat-item" onclick="loadFavorites(this)" style="color:#dcb954;">⭐ Mijn Favorieten</div>';
        if (data && data.length > 0) {
          for (var i = 0; i < data.length; i++) {
            var name = data[i].category_name ? data[i].category_name.replace(/'/g, "\\'") : "Onbekend";
            var id = data[i].category_id;
            html += '<div class="cat-item" onclick="loadChannels(\'' + id + '\', \'' + name + '\', this)">' + data[i].category_name + '</div>';
          }
        }
        catDiv.innerHTML = html;
      }, function(err) { catDiv.innerHTML = '<div class="loading-msg">De server is onbereikbaar.</div>'; });
    }

    function setActiveCategory(elem) {
      var items = document.querySelectorAll('.cat-item');
      for (var i = 0; i < items.length; i++) items[i].className = "cat-item";
      if(elem) elem.className = "cat-item active";
      document.getElementById("search-box").value = "";
    }

    /* == ZENDERS LADEN == */
    function loadChannels(categoryId, categoryName, elem) {
      setActiveCategory(elem);
      var chanDiv = document.getElementById("list-chans");
      chanDiv.innerHTML = '<div class="loading-msg">Verwerken...</div>';
      
      var chanUrl = xtreamUrl + "/player_api.php?username=" + xtreamUser + "&password=" + xtreamPass + "&action=get_live_streams&category_id=" + categoryId;
      fetchData("tw_cache_chans_" + categoryId, chanUrl, 21600000, function(data) {
        currentChannels = data || [];
        renderChannelList(currentChannels);
      }, function(err) { chanDiv.innerHTML = '<div class="loading-msg">Mislukt.</div>'; });
    }

    /* == FAVORIETEN LADEN & OPSLAAN == */
    function loadFavorites(elem) {
      setActiveCategory(elem);
      currentChannels = myFavorites;
      if(currentChannels.length === 0) {
          document.getElementById("list-chans").innerHTML = '<div class="loading-msg">Nog geen favorieten. Klik sterretje om toe te voegen.</div>';
      } else {
          renderChannelList(currentChannels);
      }
    }

    function isFav(id) {
      for(var i=0; i<myFavorites.length; i++) { if(myFavorites[i].stream_id == id) return true; }
      return false;
    }

    function toggleFavorite(e, id, name) {
      e.stopPropagation(); // Voorkom dat de video direct afspeelt
      var foundIdx = -1;
      for(var i=0; i<myFavorites.length; i++) { if(myFavorites[i].stream_id == id) { foundIdx = i; break; } }
      
      if(foundIdx !== -1) {
        myFavorites.splice(foundIdx, 1);
        e.target.innerHTML = '☆'; e.target.style.color = '#444';
      } else {
        myFavorites.push({stream_id: id, name: name});
        e.target.innerHTML = '★'; e.target.style.color = '#dcb954';
      }
      localStorage.setItem("tw_favs", JSON.stringify(myFavorites));
      
      // Als we in the favorietenlijst zitten, herlaad:
      if(document.querySelector('.cat-item.active') && document.querySelector('.cat-item.active').innerHTML.indexOf('Favorieten') > -1) {
        loadFavorites(document.querySelector('.cat-item.active'));
      }
    }

    /* == RENDER & SEARCH == */
    function renderChannelList(dataList) {
      var chanDiv = document.getElementById("list-chans");
      var html = "";
      for (var i = 0; i < dataList.length; i++) {
        var id = dataList[i].stream_id;
        var nameSafe = dataList[i].name ? dataList[i].name.replace(/'/g, "\\'").replace(/"/g, "&quot;") : "Onbekend";
        var starIcon = isFav(id) ? '<span class="star-btn" style="color:#dcb954;" onclick="toggleFavorite(event, '+id+', \''+nameSafe+'\')">★</span>' 
                                 : '<span class="star-btn" onclick="toggleFavorite(event, '+id+', \''+nameSafe+'\')">☆</span>';
        
        html += '<div class="chan-item" data-name="' + nameSafe.toLowerCase() + '" onclick="playChannel(' + id + ', \'' + nameSafe + '\', this)">';
        html += dataList[i].name + starIcon + '</div>';
      }
      chanDiv.innerHTML = html;
    }

    function filterChannels() {
      var query = document.getElementById("search-box").value.toLowerCase();
      var items = document.querySelectorAll('.chan-item');
      for (var i = 0; i < items.length; i++) {
        var itemName = items[i].getAttribute('data-name');
        items[i].style.display = (itemName.indexOf(query) > -1) ? "block" : "none";
      }
    }

    /* == VIDEO SPELER == */
    var hlsPlayer = null;
    function playChannel(streamId, name, elem) {
      // Styling markeren
      var items = document.querySelectorAll('.chan-item');
      for (var i = 0; i < items.length; i++) items[i].className = "chan-item";
      if(elem) elem.className = "chan-item active";

      document.getElementById("info-title").innerHTML = name;
      document.getElementById("info-subtitle").innerHTML = "Stream laden...";
      document.getElementById("epg-timeline").innerHTML = "";

      var streamUrl = xtreamUrl + "/live/" + xtreamUser + "/" + xtreamPass + "/" + streamId + ".m3u8";
      var video = document.getElementById("video-player");
      
      if (video.canPlayType('application/vnd.apple.mpegurl') || video.canPlayType('application/x-mpegURL')) {
        video.src = streamUrl;
        video.load(); 
        video.play();
      } else if (typeof Hls !== 'undefined' && Hls.isSupported()) {
        if (hlsPlayer) { hlsPlayer.destroy(); }
        hlsPlayer = new Hls({xhrSetup: function(xhr) { xhr.withCredentials = false; }});
        hlsPlayer.loadSource(streamUrl);
        hlsPlayer.attachMedia(video);
        hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function() { video.play(); });
      }

      loadEpg(streamId);
    }

    /* == EPG (TV GIDS) == */
    function decodeBase64(str) {
      try { return decodeURIComponent(escape(window.atob(str))); } 
      catch(e) { return str; }
    }

    function loadEpg(streamId) {
      var epgDiv = document.getElementById("epg-timeline");
      var epgUrl = xtreamUrl + "/player_api.php?username=" + xtreamUser + "&password=" + xtreamPass + "&action=get_short_epg&stream_id=" + streamId + "&limit=3";
      
      fetchData("tw_cache_epg_" + streamId, epgUrl, 1800000, function(data) {
        var html = "";
        var programs = (data && data.epg_listings) ? data.epg_listings : (data.length > 0 && !data.user_info ? data : false);

        if (programs && programs.length > 0) {
          document.getElementById("info-subtitle").innerHTML = "Actieve uitzending: " + decodeBase64(programs[0].title);
          for (var i = 0; i < programs.length; i++) {
            var start = programs[i].start || "??:??";
            var end = programs[i].end || "??:??";
            var title = programs[i].title ? decodeBase64(programs[i].title) : "Geen titel";
            var desc = programs[i].description ? decodeBase64(programs[i].description) : "Geen beschrijving.";
            var cls = (i === 0) ? "epg-slot now-playing" : "epg-slot";
            
            html += '<div class="' + cls + '"><div class="epg-time">' + start + ' - ' + end + '</div>';
            html += '<div class="epg-title">' + title + '</div><div class="epg-desc">' + desc + '</div></div>';
          }
        } else {
          document.getElementById("info-subtitle").innerHTML = "Geen TV gids beschikbaar.";
          html = '<div class="loading-msg">Geen EPG data voor deze zender.</div>';
        }
        epgDiv.innerHTML = html;
      }, function(err) { document.getElementById("info-subtitle").innerHTML = "Netwerkfout."; });
    }
  </script>
</body>
</html>

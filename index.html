<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>IPTV Speler (iOS 9.3.5)</title>
  <style>
    /* Sophisticated Dark CSS voor WebKit op iOS 9 */
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #0a0a0a;
      color: #e0e0e0;
      -webkit-text-size-adjust: 100%;
    }

    /* Helper klassen */
    .hidden { display: none; }

    /* Inlogscherm */
    #login-screen {
      width: 320px;
      margin: 60px auto;
      background: #141414;
      padding: 30px 24px;
      -webkit-border-radius: 8px;
      border-radius: 8px;
      border: 1px solid #2a2a2a;
      -webkit-box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }
    #login-screen h2 {
      margin-top: 0;
      margin-bottom: 24px;
      font-size: 22px;
      text-align: center;
      color: #f0f0f0;
      font-family: Georgia, serif;
      font-style: italic;
      letter-spacing: 1px;
    }
    .input-field {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 16px;
      -webkit-box-sizing: border-box;
      box-sizing: border-box;
      background-color: #0a0a0a;
      border: 1px solid #2a2a2a;
      color: #e0e0e0;
      -webkit-border-radius: 4px;
      border-radius: 4px;
      font-size: 14px;
      -webkit-transition: border-color 0.2s;
      transition: border-color 0.2s;
    }
    .input-field:focus {
      outline: none;
      border-color: #c5a059;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: #c5a059;
      color: #000;
      border: none;
      -webkit-border-radius: 4px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn:active {
      background: #a48243;
    }
    #login-status {
      margin-top: 16px;
      color: #e74c3c;
      font-size: 12px;
      text-align: center;
      font-family: Monaco, Consolas, "Courier New", monospace;
    }

    /* App Scherm (Floats layout) */
    #app-screen {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      overflow: hidden;
      background-color: #0a0a0a;
    }

    /* Zijbalk (Links) */
    #sidebar {
      width: 30%;
      height: 100%;
      float: left;
      background: #111111;
      border-right: 1px solid #222;
      -webkit-box-sizing: border-box;
      box-sizing: border-box;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* Hoofdscherm (Rechts) */
    #main-content {
      width: 70%;
      height: 100%;
      float: left;
      background: #0a0a0a;
      -webkit-box-sizing: border-box;
      box-sizing: border-box;
      position: relative;
    }

    /* Video Speler */
    #video-container {
      width: 100%;
      background: #000;
      border-bottom: 1px solid #222;
    }
    video {
      width: 100%;
      height: 50vh;
      background: #000;
      display: block;
    }

    /* EPG Gids */
    #epg-container {
      width: 100%;
      height: 50vh;
      background: #0d0d0d;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 24px 32px;
      -webkit-box-sizing: border-box;
      box-sizing: border-box;
    }
    #epg-container h3 {
      margin-top: 0;
      padding-bottom: 16px;
      color: #ffffff;
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 28px;
      font-weight: normal;
    }

    /* Lijst items */
    .sidebar-title {
      background: #161616;
      padding: 16px 20px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #c5a059;
      font-weight: bold;
      border-bottom: 1px solid #222;
      cursor: pointer;
    }
    .sidebar-title:active {
      background: #111;
    }
    #sidebar-content {
      padding-bottom: 20px;
    }
    .list-item {
      padding: 16px 20px;
      border-bottom: 1px solid #222;
      color: #e0e0e0;
      cursor: pointer;
      font-size: 14px;
      border-left: 4px solid transparent;
    }
    .list-item:active {
      background-color: #161616;
    }
    .list-item.active {
      background-color: #1a1a1a;
      border-left-color: #c5a059;
      color: #ffffff;
      font-weight: 500;
    }

    /* EPG Programma's */
    .epg-item {
      margin-bottom: 16px;
      padding: 16px;
      background: #141414;
      border: 1px solid #222;
      -webkit-border-radius: 4px;
      border-radius: 4px;
    }
    .epg-time {
      font-family: Monaco, Consolas, "Courier New", monospace;
      color: #888;
      font-size: 11px;
      margin-bottom: 6px;
    }
    .epg-title {
      font-weight: 500;
      font-size: 15px;
      margin: 0 0 6px 0;
      color: #ffffff;
    }
    .epg-desc {
      font-size: 13px;
      color: #aaa;
      line-height: 1.5;
    }
    .loading {
      padding: 30px;
      text-align: center;
      color: #666;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

  <!-- Inlogscherm -->
  <div id="login-screen">
    <h2>IPTV Login</h2>
    <input type="url" id="ix-url" class="input-field" placeholder="http://server.com:poort" value="" />
    <input type="text" id="ix-user" class="input-field" placeholder="Gebruikersnaam" value="" />
    <input type="password" id="ix-pass" class="input-field" placeholder="Wachtwoord" value="" />
    
    <label style="display: block; font-size: 11px; margin-bottom: 12px; color: #aaa; font-family: sans-serif;">
      <input type="checkbox" id="ix-proxy" style="vertical-align: middle;" checked> Gebruik webbrowser proxy (Forceer CORS bypass via corsproxy.io)
    </label>

    <button class="btn" onclick="login()">Inloggen</button>
    <div id="login-status"></div>
  </div>

  <!-- App Scherm -->
  <div id="app-screen" class="hidden">
    
    <div id="sidebar">
      <div id="sidebar-header" class="sidebar-title" onclick="loadCategories()">&#8592; Categorieën vernieuwen</div>
      <div id="sidebar-content">
        <div class="loading">Categorieën laden...</div>
      </div>
    </div>

    <div id="main-content">
      <div id="video-container">
        <!-- Native HTML5 Video met HLS ondersteuning op iOS 9 -->
        <video id="video-player" controls preload="none">
          Uw browser ondersteunt geen HTML5 video.
        </video>
      </div>
      <div id="epg-container">
        <h3 id="channel-title">Selecteer een zender</h3>
        <div id="epg-content">
          <div class="loading">Wachten op zenderselectie...</div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // ES5 Strict Modus (Geen let, const of arrow functions)
    var xtreamUrl = "";
    var xtreamUser = "";
    var xtreamPass = "";

    // Proxy optie voor testen in de browser, default true voor omgevingen zoals AI Studio
    var useProxy = true; 

    // Simpele XHR Helper Functie
    function ajaxRequest(url, onSuccess, onError) {
      if (useProxy && url.indexOf('http') === 0 && url.indexOf('localhost') === -1) {
          // corsproxy.io is vaak sneller en betrouwbaarder.
          url = "https://corsproxy.io/?" + encodeURIComponent(url);
      }

      var xhr = new XMLHttpRequest();
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status >= 200 && xhr.status < 300) {
            try {
              var data = JSON.parse(xhr.responseText);
              onSuccess(data);
            } catch (e) {
              onError("Fout bij verwerken data: " + e.message);
            }
          } else if (xhr.status !== 0) {
            onError("Netwerkfout: " + xhr.status + " bij laden van " + url);
          }
        }
      };

      xhr.onerror = function() {
        onError("Verbindingsfout (Status 0). Dit betekent dat je browser de aanvraag blokkeert.<br><br><b>Oorzaken:</b><br>- Je adblocker (bijv. uBlock) blokkeert de proxy.<br>- De provider blokkeert het proxy IP.<br><br>Tip: Zet je adblocker uit en probeer opnieuw.");
      };
      
      try {
        xhr.open("GET", url, true);
        xhr.send();
      } catch (err) {
        onError("Kan aanvraag niet verzenden. Fout: " + err.message);
      }
    }

    // Fix voor URL formatting
    function formatUrl(url) {
      if (!url) return "";
      if (url.charAt(url.length - 1) === '/') {
        return url.substr(0, url.length - 1);
      }
      if (url.indexOf("http") !== 0) {
        return "http://" + url;
      }
      return url;
    }

    // Inlog Functie
    function login() {
      xtreamUrl = formatUrl(document.getElementById("ix-url").value);
      xtreamUser = document.getElementById("ix-user").value;
      xtreamPass = encodeURIComponent(document.getElementById("ix-pass").value);
      useProxy = document.getElementById("ix-proxy").checked;
      
      var statusDiv = document.getElementById("login-status");

      if (!xtreamUrl || !xtreamUser || !xtreamPass) {
        statusDiv.innerHTML = "Vul alle velden in.";
        return;
      }

      var authUrl = xtreamUrl + "/player_api.php?username=" + xtreamUser + "&password=" + xtreamPass;
      statusDiv.innerHTML = "Bezig met inloggen...";

      ajaxRequest(authUrl, function(data) {
        if (data.user_info && data.user_info.auth === 1) {
          document.getElementById("login-screen").className = "hidden";
          document.getElementById("app-screen").className = "";
          loadCategories();
        } else {
          statusDiv.innerHTML = "Ongeldige inloggegevens.";
        }
      }, function(err) {
        statusDiv.innerHTML = "Fout: " + err + "<br/>Controleer de URL of CORS beperkingen.";
      });
    }

    // Categorieën Laden
    function loadCategories() {
      document.getElementById("sidebar-header").innerHTML = "Categorieën";
      document.getElementById("sidebar-header").onclick = loadCategories; // Refresh
      var contentDiv = document.getElementById("sidebar-content");
      contentDiv.innerHTML = '<div class="loading">Laden...</div>';

      var catUrl = xtreamUrl + "/player_api.php?username=" + xtreamUser + "&password=" + xtreamPass + "&action=get_live_categories";
      
      ajaxRequest(catUrl, function(data) {
        var html = "";
        if (data && data.length > 0) {
          for (var i = 0; i < data.length; i++) {
            var catName = data[i].category_name ? data[i].category_name.replace(/'/g, "\\'") : "Onbekend";
            var catId = data[i].category_id;
            html += '<div class="list-item" onclick="loadChannels(\'' + catId + '\', \'' + catName + '\')">' + data[i].category_name + '</div>';
          }
        } else {
          html = '<div class="loading">Geen categorieën gevonden.</div>';
        }
        contentDiv.innerHTML = html;
      }, function(err) {
        contentDiv.innerHTML = '<div class="loading">Fout: ' + err + '</div>';
      });
    }

    // Zenders Laden per categorie
    function loadChannels(categoryId, categoryName) {
      var headerDiv = document.getElementById("sidebar-header");
      headerDiv.innerHTML = "&#8592; Terug (Cat: " + categoryName + ")";
      headerDiv.onclick = loadCategories;
      
      var contentDiv = document.getElementById("sidebar-content");
      contentDiv.innerHTML = '<div class="loading">Zenders ophalen...</div>';

      var chanUrl = xtreamUrl + "/player_api.php?username=" + xtreamUser + "&password=" + xtreamPass + "&action=get_live_streams&category_id=" + categoryId;
      
      ajaxRequest(chanUrl, function(data) {
        var html = "";
        if (data && data.length > 0) {
          for (var i = 0; i < data.length; i++) {
            var name = data[i].name ? data[i].name.replace(/'/g, "\\'").replace(/"/g, "&quot;") : "Onbekende Zender";
            var streamId = data[i].stream_id;
            html += '<div class="list-item" onclick="playChannel(' + streamId + ', \'' + name + '\', this)">' + data[i].name + '</div>';
          }
        } else {
          html = '<div class="loading">Geen zenders in deze categorie.</div>';
        }
        contentDiv.innerHTML = html;
      }, function(err) {
        contentDiv.innerHTML = '<div class="loading">Fout: ' + err + '</div>';
      });
    }

    // Speel kanaal af en haal EPG op
    function playChannel(streamId, name, element) {
      // Styling updaten
      var items = document.querySelectorAll('.list-item.active');
      for (var i = 0; i < items.length; i++) {
        items[i].className = "list-item";
      }
      if (element) {
        element.className = "list-item active";
      }

      // HLS link voor iOS (Native support)
      var streamUrl = xtreamUrl + "/live/" + xtreamUser + "/" + xtreamPass + "/" + streamId + ".m3u8";
      
      var video = document.getElementById("video-player");
      video.src = streamUrl;
      video.play(); // Op iOS is user-interaction vereist, klikken op zender telt

      document.getElementById("channel-title").innerHTML = name;
      loadEpg(streamId);
    }

    // Decodeer HTML entities in strings 
    function decodeHtml(html) {
        var txt = document.createElement("textarea");
        txt.innerHTML = html;
        return txt.value;
    }

    // EPG data laden
    function loadEpg(streamId) {
      var epgDiv = document.getElementById("epg-content");
      epgDiv.innerHTML = '<div class="loading">EPG ophalen...</div>';

      var epgUrl = xtreamUrl + "/player_api.php?username=" + xtreamUser + "&password=" + xtreamPass + "&action=get_short_epg&stream_id=" + streamId + "&limit=4";
      
      ajaxRequest(epgUrl, function(data) {
        var html = "";
        // Afhankelijk van de Xtream versie kan het direct de lijst zijn of ingepakt
        var programs = (data && data.epg_listings) ? data.epg_listings : false;
        
        if (!programs && data && typeof data.length !== 'undefined' && data.length > 0 && !data.user_info) {
           programs = data; 
        }

        if (programs && programs.length > 0) {
          for (var i = 0; i < programs.length; i++) {
            var prog = programs[i];
            var start = prog.start || "";
            var end = prog.end || "";
            var title = prog.title ? decodeHtml(prog.title) : "Geen titel";
            var desc = prog.description ? decodeHtml(prog.description) : "";
            
            html += '<div class="epg-item">';
            html += '<div class="epg-time">' + start + ' - ' + end + '</div>';
            html += '<div class="epg-title">' + title + '</div>';
            html += '<div class="epg-desc">' + desc + '</div>';
            html += '</div>';
          }
        } else {
          html = '<div class="loading">Geen EPG data beschikbaar.</div>';
        }
        epgDiv.innerHTML = html;
      }, function(err) {
        epgDiv.innerHTML = '<div class="loading">Kan EPG niet laden: ' + err + '</div>';
      });
    }
  </script>
</body>
</html>
